name: ethiomed
description: "Offline-first medical education app for Ethiopian health science students."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  dio: ^5.8.0
  drift: ^2.27.0
  flutter_markdown: ^0.7.6+2
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  fsrs: ^2.0.0
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  path_provider: ^2.1.5
  path: ^1.9.0
  riverpod_annotation: ^2.6.1
  share_plus: ^10.1.0
  shared_preferences: ^2.3.2
  shimmer: ^3.0.0
  sqlite3_flutter_libs: ^0.5.31
  supabase_flutter: ^2.14.0
  url_launcher: ^6.3.0
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  firebase_core: ^3.12.0
  firebase_crashlytics: ^4.3.0
  sqlite3: ^2.9.4

dev_dependencies:
  build_runner: ^2.4.0
  drift_dev: ^2.27.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
  assets:
    - assets/flashcards/
    - assets/data/
