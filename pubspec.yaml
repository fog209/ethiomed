name: ethiomed
description: "Offline-first medical education app for Ethiopian health science students."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  dio: ^5.8.0
  drift: ^2.27.0
  flutter_markdown: ^0.7.6+2
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  path_provider: ^2.1.5
  riverpod_annotation: ^2.6.1
  shimmer: ^3.0.0
  sqlite3_flutter_libs: ^0.5.31
  supabase_flutter: ^2.14.0

dev_dependencies:
  build_runner: ^2.4.0
  drift_dev: ^2.27.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
